<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris (TDD demo)</title>
  <style>
    /* basic styling */
    body { font-family: sans-serif; background: #fff; color: #000; display: flex; justify-content: center; }
    #game { margin: 0; width: 320px; height: 640px; background: #eee; position: relative; }
    canvas { display: block; }
  </style>
  <script type="module" crossorigin src="/tetris/assets/index-cba582cd.js"></script>
</head>
<body>
  <div id="layout" style="display:flex; align-items:flex-start;">
    <div id="controls" style="margin-right:20px;">
      <h1>Tetris</h1>
      <div style="margin-bottom:10px;">
        <label for="speedSelect">Speed:</label>
        <select id="speedSelect">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
        </select>
      </div>
      <div style="margin-bottom:10px;">
        <button id="startBtn">Start</button>
        <button id="restartBtn" style="display:none;">Restart</button>
      </div>
      <div>
        <span id="scoreDisplay">Score: 0</span>
      </div>
    </div>
    <div id="game">
      <canvas id="canvas" width="320" height="640"></canvas>
    </div>
  </div>
  
</body>
</html>
